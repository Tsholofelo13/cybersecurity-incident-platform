# Server
# Change to a different port
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/cybersecurity_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=cybersecuritySecretKey2026ForJWTTokenGeneration123456789
jwt.expiration=86400000

# Logging
logging.level.com.cybersecurity=DEBUG
jwt.secret=cybersecuritySecretKey2026ForJWTTokenGenerationMustBeAtLeast32Chars
jwt.expiration=86400000
